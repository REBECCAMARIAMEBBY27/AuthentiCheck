<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Media Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Media Authenticity Checker</h1>

<!-- Tabs -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('text', this)">Text</button>
    <button class="tab" onclick="switchTab('image', this)">Image</button>
    <button class="tab" onclick="switchTab('audio', this)">Audio</button>
</div>

<!-- Text -->
<textarea id="textInput" placeholder="Enter text here..."></textarea>

<!-- File -->
<input type="file" id="fileInput" hidden>
<br>
<button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    Upload File
</button>

<!-- Preview -->
<br>
<img id="previewImage">

<!-- Analyze -->
<br>
<button type="button" class="btn" onclick="analyze()">ANALYZE NOW</button>

<!-- Results -->
<div class="bar-container">
    <p>Human: <span id="humanPercent">0%</span></p>
    <div class="bar" id="humanBar"></div>

    <p>AI: <span id="aiPercent">0%</span></p>
    <div class="bar" id="aiBar"></div>
</div>

<script src="script.js"></script>

</body>
</html>
