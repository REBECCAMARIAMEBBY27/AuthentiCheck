<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Media Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Media Authenticity Checker</h1>

<!-- Tabs -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('text', this)">Text</button>
    <button class="tab" onclick="switchTab('image', this)">Image</button>
    <button class="tab" onclick="switchTab('audio', this)">Audio</button>
</div>

<!-- Text -->
<textarea id="textInput" placeholder="Enter text here..."></textarea>

<!-- File -->
<input type="file" id="fileInput" hidden>
<br>
<button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    Upload File
</button>

<!-- Preview -->
<br>
<img id="previewImage" style="max-width:300px; display:none;">

<!-- Analyze -->
<br>
<button type="button" class="btn" onclick="analyze()">ANALYZE NOW</button>

<!-- ✅ NEW RESULT DISPLAY -->
<div id="result" style="margin-top:20px; font-size:22px;"></div>

<script src="script.js"></script>

</body>
</html>
